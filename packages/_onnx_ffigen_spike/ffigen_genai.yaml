name: OrtGenAiBindings
description: 'FFI bindings for ORT-GenAI C API (ort_genai_c.h v0.14.0)'
output: 'lib/src/ort_genai_bindings.g.dart'

headers:
  entry-points:
    - 'native/headers/ort_genai_c.h'
  include-directives:
    - 'native/headers/ort_genai_c.h'

compiler-opts:
  - '-I'
  - 'native/headers'
  # Suppress non-standard __declspec on macOS (the header guards it correctly
  # with __WINDOWS__ but ffigen still processes the macros)
  - '-D__APPLE__'

# Include only OGA_ symbols — skip any system-header noise
functions:
  include:
    - 'Oga.*'

structs:
  include:
    - 'Oga.*'

typedefs:
  include:
    - 'Oga.*'

enums:
  include:
    - 'Oga.*'

unnamed-enums:
  include:
    - 'Oga.*'

macros:
  include:
    - 'OGA_.*'

globals:
  exclude:
    - '.*'

silence-enum-warning: true

preamble: |
  // AUTO-GENERATED by ffigen — DO NOT EDIT.
  // Source: native/headers/ort_genai_c.h
  // ORT-GenAI version: 0.14.0
  // Header commit: b7a6ec307bea84e3b64aa33d59bcad817122d9af (microsoft/onnxruntime-genai tag v0.14.0)
  //
  // Key symbols bound: OgaCreateModel, OgaCreateGeneratorParams,
  // OgaGenerator_GenerateNextToken, OgaCreateTokenizer
  // ignore_for_file: unused_import
