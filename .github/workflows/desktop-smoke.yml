name: Desktop Smoke Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Cache LiteRT-LM resources
        uses: actions/cache@v4
        with:
          path: ~/.cache/flutter_gemma
          key: litertlm-linux-${{ hashFiles('linux/scripts/setup_desktop.sh') }}
          restore-keys: litertlm-linux-

      - name: Install plugin dependencies
        run: flutter pub get

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Build Linux release
        working-directory: example
        run: flutter build linux --release

      - name: Verify build artifacts
        run: |
          BUNDLE="example/build/linux/x64/release/bundle"
          echo "=== Checking build artifacts ==="

          # JAR
          test -f "$BUNDLE/data/litertlm-server.jar" || { echo "FAIL: litertlm-server.jar not found"; exit 1; }
          echo "OK: litertlm-server.jar ($(du -h "$BUNDLE/data/litertlm-server.jar" | cut -f1))"

          # JRE
          test -f "$BUNDLE/lib/jre/bin/java" || { echo "FAIL: JRE not found"; exit 1; }
          echo "OK: JRE found"

          # Native library
          test -f "$BUNDLE/lib/litertlm/liblitertlm_jni.so" || { echo "FAIL: liblitertlm_jni.so not found"; exit 1; }
          echo "OK: liblitertlm_jni.so ($(du -h "$BUNDLE/lib/litertlm/liblitertlm_jni.so" | cut -f1))"

          echo "=== All artifacts present ==="

      - name: Start JVM server
        run: |
          BUNDLE="example/build/linux/x64/release/bundle"
          JAVA="$BUNDLE/lib/jre/bin/java"
          JAR="$BUNDLE/data/litertlm-server.jar"
          NATIVES="$BUNDLE/lib/litertlm"

          chmod +x "$JAVA"

          LD_LIBRARY_PATH="$NATIVES" "$JAVA" \
            -Djava.library.path="$NATIVES" \
            -Xmx512m \
            -jar "$JAR" \
            50051 \
            > /tmp/litertlm-server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

          echo "Waiting for server to start (PID: $SERVER_PID)..."
          for i in $(seq 1 60); do
            if grep -q "started on port" /tmp/litertlm-server.log 2>/dev/null; then
              echo "Server started after ${i}s"
              cat /tmp/litertlm-server.log
              exit 0
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process died!"
              cat /tmp/litertlm-server.log
              exit 1
            fi
            sleep 1
          done
          echo "Server startup timed out after 60s"
          cat /tmp/litertlm-server.log
          exit 1

      - name: Run smoke tests
        run: flutter test test/desktop_server_smoke_test.dart --dart-define=SMOKE_TEST_PORT=50051

      - name: Stop server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
          fi

      - name: Upload server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: litertlm-server-log-linux
          path: /tmp/litertlm-server.log
          retention-days: 7

  build-windows:
    runs-on: windows-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Cache LiteRT-LM resources
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\flutter_gemma
          key: litertlm-windows-${{ hashFiles('windows/scripts/setup_desktop.ps1') }}
          restore-keys: litertlm-windows-

      - name: Install plugin dependencies
        run: flutter pub get

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Build Windows release
        working-directory: example
        run: flutter build windows --release

      - name: Verify build artifacts
        shell: pwsh
        run: |
          $Bundle = "example\build\windows\x64\runner\Release"
          Write-Host "=== Checking build artifacts ==="

          # JAR
          if (-not (Test-Path "$Bundle\data\litertlm-server.jar")) { Write-Error "FAIL: litertlm-server.jar not found"; exit 1 }
          Write-Host "OK: litertlm-server.jar ($([math]::Round((Get-Item "$Bundle\data\litertlm-server.jar").Length / 1MB, 1)) MB)"

          # JRE
          if (-not (Test-Path "$Bundle\jre\bin\java.exe")) { Write-Error "FAIL: JRE not found"; exit 1 }
          Write-Host "OK: JRE found"

          # Native library
          if (-not (Test-Path "$Bundle\litertlm\litertlm_jni.dll")) { Write-Error "FAIL: litertlm_jni.dll not found"; exit 1 }
          Write-Host "OK: litertlm_jni.dll ($([math]::Round((Get-Item "$Bundle\litertlm\litertlm_jni.dll").Length / 1MB, 1)) MB)"

          Write-Host "=== All artifacts present ==="

      - name: Start JVM server
        shell: pwsh
        run: |
          $Bundle = "example\build\windows\x64\runner\Release"
          $Java = "$Bundle\jre\bin\java.exe"
          $Jar = "$Bundle\data\litertlm-server.jar"
          $Natives = "$Bundle\litertlm"

          # Add natives to PATH so JVM can find DLLs (validates fix for #212)
          $env:PATH = "$Natives;$env:PATH"

          $process = Start-Process -FilePath $Java -ArgumentList @(
            "-Djava.library.path=$Natives",
            "-Xmx512m",
            "-jar", $Jar,
            "50051"
          ) -PassThru -RedirectStandardOutput "$env:TEMP\litertlm-server-stdout.log" -RedirectStandardError "$env:TEMP\litertlm-server-stderr.log" -NoNewWindow

          "SERVER_PID=$($process.Id)" | Out-File -FilePath $env:GITHUB_ENV -Append

          Write-Host "Waiting for server to start (PID: $($process.Id))..."
          $started = $false
          for ($i = 1; $i -le 60; $i++) {
            if (Test-Path "$env:TEMP\litertlm-server-stdout.log") {
              $log = Get-Content "$env:TEMP\litertlm-server-stdout.log" -Raw -ErrorAction SilentlyContinue
              if ($log -and $log.Contains("started on port")) {
                Write-Host "Server started after ${i}s"
                Write-Host $log
                $started = $true
                break
              }
            }
            if ($process.HasExited) {
              Write-Host "Server process died! Exit code: $($process.ExitCode)"
              if (Test-Path "$env:TEMP\litertlm-server-stdout.log") { Get-Content "$env:TEMP\litertlm-server-stdout.log" }
              if (Test-Path "$env:TEMP\litertlm-server-stderr.log") { Get-Content "$env:TEMP\litertlm-server-stderr.log" }
              exit 1
            }
            Start-Sleep -Seconds 1
          }
          if (-not $started) {
            Write-Host "Server startup timed out after 60s"
            if (Test-Path "$env:TEMP\litertlm-server-stdout.log") { Get-Content "$env:TEMP\litertlm-server-stdout.log" }
            if (Test-Path "$env:TEMP\litertlm-server-stderr.log") { Get-Content "$env:TEMP\litertlm-server-stderr.log" }
            exit 1
          }

      - name: Run smoke tests
        run: flutter test test/desktop_server_smoke_test.dart --dart-define=SMOKE_TEST_PORT=50051

      - name: Stop server
        if: always()
        shell: pwsh
        run: |
          if ($env:SERVER_PID) {
            Stop-Process -Id $env:SERVER_PID -Force -ErrorAction SilentlyContinue
          }

      - name: Upload server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: litertlm-server-log-windows
          path: |
            ~\AppData\Local\Temp\litertlm-server-stdout.log
            ~\AppData\Local\Temp\litertlm-server-stderr.log
          retention-days: 7
