name: flutter_gemma_example
description: "Demonstrates how to use the flutter_gemma plugin."
# The following line prevents the package from being accidentally published to
# pub.dev using `flutter pub publish`. This is preferred for private packages.
publish_to: 'none' # Remove this line if you wish to publish to pub.dev

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: '>=3.44.0'

# Dependencies specify other packages that your package needs in order to work.
# To automatically upgrade your package dependencies to the latest versions
# consider running `flutter pub upgrade --major-versions`. Alternatively,
# dependencies can be manually updated by changing the version numbers below to
# the latest version available on pub.dev. To see which dependencies have newer
# versions available, run `flutter pub outdated`.
dependencies:
  flutter:
    sdk: flutter

  equatable: ^2.0.3
  flutter_bloc: ^8.0.1
  flutter_gemma:
    path: ../
  flutter_gemma_rag_sqlite:
    path: ../../flutter_gemma_rag_sqlite
  flutter_gemma_rag_qdrant:
    path: ../../flutter_gemma_rag_qdrant
  flutter_gemma_litertlm:
    path: ../../flutter_gemma_litertlm
  flutter_gemma_embeddings:
    path: ../../flutter_gemma_embeddings
  flutter_gemma_mediapipe:
    path: ../../flutter_gemma_mediapipe

  # The following adds the Cupertino Icons font to your application.
  # Use with the CupertinoIcons class for iOS style icons.
  cupertino_icons: ^1.0.6

  # App-level packages used by the example UI. These MUST be declared here (not
  # only in dependency_overrides) — an override without a real dependency entry
  # is ignored by pub, so the plugin would drop out of the plugin graph and the
  # generated registrant (desktop audio/url_launcher broke this way after the
  # 1.0 split). Versions mirror the overrides below.
  flutter_markdown: ^0.7.1
  url_launcher: ^6.3.1
  http: ^1.3.0
  web: ^1.1.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.2
  background_downloader: ^9.2.3
  image_picker: ^1.0.4
  record: ^6.0.0
  permission_handler: ^11.3.1
  just_audio: ^0.9.36

# The opt-in packages now declare a HOSTED dependency on flutter_gemma
# (`^1.0.0-rc.1`) for publishing. This example consumes the local source, so
# override flutter_gemma to the local path — this resolves the path-vs-hosted
# conflict (every package, including the siblings, resolves core from source).
# Overrides only apply to this example; they are ignored for published packages.
dependency_overrides:
  flutter_gemma:
    path: ../
  flutter_markdown: ^0.7.1
  url_launcher: ^6.3.1
  http: ^1.3.0
  web: ^1.1.1
  path_provider: ^2.1.5
  shared_preferences: ^2.5.2
  background_downloader: ^9.2.3  # For integration tests

  # Dependencies for working with images
  image_picker: ^1.0.4 # For selecting images on mobile devices

  # Dependencies for working with audio
  record: ^6.0.0                  # Audio recording
  permission_handler: ^11.3.1     # Microphone permissions
  just_audio: ^0.9.36             # Audio playback (for preview)

dev_dependencies:
  integration_test:
    sdk: flutter
  flutter_test:
    sdk: flutter
  path: ^1.9.0

  # The "flutter_lints" package below contains a set of recommended lints to
  # encourage good coding practices. The lint set provided by the package is
  # activated in the `analysis_options.yaml` file located at the root of your
  # package. See that file for information about deactivating specific lint
  # rules and activating additional ones.
  flutter_lints: ^3.0.0

# For information on the generic Dart part of this file, see the
# following page: https://dart.dev/tools/pub/pubspec

# The following section is specific to Flutter packages.
flutter:

  # The following line ensures that the Material Icons font is
  # included with your application, so that you can use the icons in
  # the material Icons class.
  uses-material-design: true

  # To add assets to your application, add an assets section, like this:
  assets:
    - assets/
    - assets/models/
    - assets/test/

  # An image asset can refer to one or more resolution-specific "variants", see
  # https://flutter.dev/assets-and-images/#resolution-aware

  # For details regarding adding assets from package dependencies, see
  # https://flutter.dev/assets-and-images/#from-packages

  # To add custom fonts to your application, add a fonts section here,
  # in this "flutter" section. Each entry in this list should have a
  # "family" key with the font family name, and a "fonts" key with a
  # list giving the asset and other descriptors for the font. For
  # example:
  # fonts:
  #   - family: Schyler
  #     fonts:
  #       - asset: fonts/Schyler-Regular.ttf
  #       - asset: fonts/Schyler-Italic.ttf
  #         style: italic
  #   - family: Trajan Pro
  #     fonts:
  #       - asset: fonts/TrajanPro.ttf
  #       - asset: fonts/TrajanPro_Bold.ttf
  #         weight: 700
  #
  # For details regarding fonts from package dependencies,
  # see https://flutter.dev/custom-fonts/#from-packages