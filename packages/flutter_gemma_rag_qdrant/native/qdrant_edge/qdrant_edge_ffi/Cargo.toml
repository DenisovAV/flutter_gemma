[package]
name = "qdrant_edge_ffi"
version = "0.0.1"
edition = "2024"
publish = false

[lib]
crate-type = ["cdylib"]

[dependencies]
qdrant-edge = "=0.7.2"
serde_json = "1"

# Pin upstream-bug-prone transitive (matches qdrant-edge example workspace)
i_key_sort = "=0.10.1"

[profile.release]
opt-level = 3
lto = "thin"
codegen-units = 1
strip = "symbols"
panic = "abort"
