name: flutter_gemma_onnx_embeddings
description: "On-device text embeddings (EmbeddingGemma .onnx/.ort via ONNX Runtime) for flutter_gemma. Opt-in EmbeddingBackendProvider for on-device RAG."
version: 0.1.0
homepage: https://github.com/DenisovAV/flutter_gemma/tree/main/packages/flutter_gemma_onnx_embeddings
repository: https://github.com/DenisovAV/flutter_gemma
issue_tracker: https://github.com/DenisovAV/flutter_gemma/issues
topics: [embeddings, gemma, onnx, onnxruntime, rag, on-device]

platforms:
  android:
  ios:
  macos:
  windows:
  linux:

resolution: workspace

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_gemma: ^1.0.1
  ffi: ^2.1.0
  flutter_onnxruntime: ^1.8.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
