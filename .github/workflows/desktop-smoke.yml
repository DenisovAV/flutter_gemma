name: Desktop Smoke Tests

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

env:
  MODEL_URL: https://huggingface.co/sasha-denisov/function-gemma-270M-it/resolve/main/functiongemma-270M-it.litertlm
  MODEL_FILENAME: functiongemma-270M-it.litertlm

jobs:
  build-linux:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          cache: true

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '21'

      - name: Install Linux desktop dependencies
        run: |
          sudo apt-get update -y
          sudo apt-get install -y clang cmake ninja-build pkg-config libgtk-3-dev liblzma-dev libstdc++-12-dev

      - name: Build server JAR from source
        working-directory: litertlm-server
        run: ./gradlew fatJar --no-daemon

      - name: Cache LiteRT-LM resources
        uses: actions/cache@v4
        with:
          path: ~/.cache/flutter_gemma
          key: litertlm-linux-${{ hashFiles('linux/scripts/setup_desktop.sh') }}
          restore-keys: litertlm-linux-

      - name: Clear cached JAR so setup uses locally built one
        run: rm -f ~/.cache/flutter_gemma/jar/litertlm-server.jar

      - name: Cache test model
        uses: actions/cache@v4
        with:
          path: /tmp/test-models
          key: smoke-model-functiongemma-270M

      - name: Download test model
        run: |
          mkdir -p /tmp/test-models
          if [ ! -f "/tmp/test-models/$MODEL_FILENAME" ]; then
            echo "Downloading $MODEL_FILENAME (271MB)..."
            curl -L --progress-bar -o "/tmp/test-models/$MODEL_FILENAME" "$MODEL_URL"
          else
            echo "Using cached model"
          fi
          ls -lh "/tmp/test-models/$MODEL_FILENAME"

      - name: Install plugin dependencies
        run: flutter pub get

      - name: Install example dependencies
        working-directory: example
        run: flutter pub get

      - name: Build Linux release
        working-directory: example
        run: flutter build linux --release

      - name: Verify build artifacts
        run: |
          BUNDLE="example/build/linux/x64/release/bundle"
          echo "=== Checking build artifacts ==="

          # JAR
          test -f "$BUNDLE/data/litertlm-server.jar" || { echo "FAIL: litertlm-server.jar not found"; exit 1; }
          echo "OK: litertlm-server.jar ($(du -h "$BUNDLE/data/litertlm-server.jar" | cut -f1))"

          # JRE
          test -f "$BUNDLE/lib/jre/bin/java" || { echo "FAIL: JRE not found"; exit 1; }
          echo "OK: JRE found"

          # Native library
          test -f "$BUNDLE/lib/litertlm/liblitertlm_jni.so" || { echo "FAIL: liblitertlm_jni.so not found"; exit 1; }
          echo "OK: liblitertlm_jni.so ($(du -h "$BUNDLE/lib/litertlm/liblitertlm_jni.so" | cut -f1))"

          echo "=== All artifacts present ==="

      - name: Start JVM server
        run: |
          BUNDLE="example/build/linux/x64/release/bundle"
          JAVA="$BUNDLE/lib/jre/bin/java"
          JAR="$BUNDLE/data/litertlm-server.jar"
          NATIVES="$BUNDLE/lib/litertlm"

          chmod +x "$JAVA"

          LD_LIBRARY_PATH="$NATIVES" "$JAVA" \
            -Djava.library.path="$NATIVES" \
            -Xmx512m \
            -jar "$JAR" \
            50051 \
            > /tmp/litertlm-server.log 2>&1 &
          SERVER_PID=$!
          echo "SERVER_PID=$SERVER_PID" >> $GITHUB_ENV

          echo "Waiting for server to start (PID: $SERVER_PID)..."
          for i in $(seq 1 60); do
            if grep -q "started on port" /tmp/litertlm-server.log 2>/dev/null; then
              echo "Server started after ${i}s"
              cat /tmp/litertlm-server.log
              exit 0
            fi
            if ! kill -0 $SERVER_PID 2>/dev/null; then
              echo "Server process died!"
              cat /tmp/litertlm-server.log
              exit 1
            fi
            sleep 1
          done
          echo "Server startup timed out after 60s"
          cat /tmp/litertlm-server.log
          exit 1

      - name: Run smoke tests
        run: |
          flutter test test/desktop_server_smoke_test.dart \
            --dart-define=SMOKE_TEST_PORT=50051 \
            --dart-define=SMOKE_TEST_MODEL_PATH=/tmp/test-models/${{ env.MODEL_FILENAME }}

      - name: Stop server
        if: always()
        run: |
          if [ -n "$SERVER_PID" ]; then
            kill $SERVER_PID 2>/dev/null || true
          fi

      - name: Upload server log
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: litertlm-server-log-linux
          path: /tmp/litertlm-server.log
          retention-days: 7
