name: Build LiteRT-LM Native Libraries

on:
  push:
    branches:
      - feature/desktop-ffi
    paths:
      - '.github/workflows/build-litertlm-native.yml'
  workflow_dispatch:
    inputs:
      litertlm_version:
        description: 'LiteRT-LM version tag'
        required: true
        default: 'v0.10.2'
      publish_release:
        description: 'Publish to GitHub Release'
        type: boolean
        default: false

jobs:
  build-linux-x86_64:
    name: Linux x86_64
    runs-on: ubuntu-22.04
    timeout-minutes: 60
    env:
      LITERTLM_VERSION: ${{ inputs.litertlm_version || 'v0.10.2' }}
    steps:
      - uses: actions/checkout@v4

      - name: Install clang 17
        run: |
          wget -qO- https://apt.llvm.org/llvm-snapshot.gpg.key | sudo apt-key add -
          echo "deb http://apt.llvm.org/jammy/ llvm-toolchain-jammy-17 main" | sudo tee /etc/apt/sources.list.d/llvm-17.list
          sudo apt-get update -qq
          sudo apt-get install -y -qq clang-17 lld-17
          sudo update-alternatives --install /usr/bin/clang clang /usr/bin/clang-17 100
          sudo update-alternatives --install /usr/bin/clang++ clang++ /usr/bin/clang++-17 100

      - name: Clone LiteRT-LM
        run: |
          git clone --depth 1 --branch "$LITERTLM_VERSION" \
            https://github.com/google-ai-edge/LiteRT-LM /tmp/LiteRT-LM
          cd /tmp/LiteRT-LM && git lfs pull --include="prebuilt/linux_x86_64/*"

      - name: Patch C API
        run: bash native/litert_lm/patch_c_api.sh /tmp/LiteRT-LM

      - name: Build libLiteRtLm.so
        run: |
          cd /tmp/LiteRT-LM
          export CC=clang-17 CXX=clang++-17
          bazelisk build --action_env=CC=clang-17 --action_env=CXX=clang++-17 '//c:libLiteRtLm.dylib'

      - name: Build libStreamProxy.so
        run: |
          gcc -shared -fPIC -o /tmp/libStreamProxy.so \
            native/litert_lm/stream_proxy.c

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp /tmp/LiteRT-LM/bazel-bin/c/libLiteRtLm.dylib artifacts/libLiteRtLm.so
          cp /tmp/libStreamProxy.so artifacts/
          cp /tmp/LiteRT-LM/prebuilt/linux_x86_64/*.so artifacts/ 2>/dev/null || true
          ls -lh artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: litertlm-linux_x86_64
          path: artifacts/

  build-linux-arm64:
    name: Linux arm64
    runs-on: ubuntu-24.04-arm
    timeout-minutes: 60
    env:
      LITERTLM_VERSION: ${{ inputs.litertlm_version || 'v0.10.2' }}
    steps:
      - uses: actions/checkout@v4

      - name: Clone LiteRT-LM
        run: |
          git clone --depth 1 --branch "$LITERTLM_VERSION" \
            https://github.com/google-ai-edge/LiteRT-LM /tmp/LiteRT-LM
          cd /tmp/LiteRT-LM && git lfs pull --include="prebuilt/linux_arm64/*"

      - name: Patch C API
        run: bash native/litert_lm/patch_c_api.sh /tmp/LiteRT-LM

      - name: Build libLiteRtLm.so
        run: |
          cd /tmp/LiteRT-LM
          bazelisk build '//c:libLiteRtLm.dylib'

      - name: Build libStreamProxy.so
        run: |
          gcc -shared -fPIC -o /tmp/libStreamProxy.so \
            native/litert_lm/stream_proxy.c

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp /tmp/LiteRT-LM/bazel-bin/c/libLiteRtLm.dylib artifacts/libLiteRtLm.so
          cp /tmp/libStreamProxy.so artifacts/
          cp /tmp/LiteRT-LM/prebuilt/linux_arm64/*.so artifacts/ 2>/dev/null || true
          ls -lh artifacts/

      - uses: actions/upload-artifact@v4
        with:
          name: litertlm-linux_arm64
          path: artifacts/

  build-windows-x86_64:
    name: Windows x86_64
    runs-on: windows-latest
    timeout-minutes: 90
    defaults:
      run:
        shell: pwsh
    env:
      LITERTLM_VERSION: ${{ inputs.litertlm_version || 'v0.10.2' }}
      ANDROID_NDK_HOME: ''
      BAZEL_OUTPUT_BASE: 'D:\b'
    steps:
      - uses: actions/checkout@v4

      - name: Enable symlinks
        run: git config --global core.symlinks true

      - name: Clone LiteRT-LM
        run: |
          git clone --depth 1 --branch "$env:LITERTLM_VERSION" `
            https://github.com/google-ai-edge/LiteRT-LM C:\LiteRT-LM
          cd C:\LiteRT-LM
          git lfs pull --include="prebuilt/windows_x86_64/*"

      - name: Patch C API
        shell: bash
        run: bash native/litert_lm/patch_c_api.sh C:/LiteRT-LM

      - name: Build LiteRtLm.dll
        run: |
          cd C:\LiteRT-LM
          bazel --output_base="$env:BAZEL_OUTPUT_BASE" `
            build --build_tag_filters='-nowindows' `
            --features=compiler_param_file `
            --features=archive_param_file `
            --spawn_strategy=local `
            '//c:libLiteRtLm.dylib'

      - uses: ilammy/msvc-dev-cmd@v1

      - name: Build StreamProxy.dll
        run: |
          cl /LD /Fe:StreamProxy.dll native\litert_lm\stream_proxy.c

      - name: Collect artifacts
        run: |
          New-Item -ItemType Directory -Path artifacts -Force
          Copy-Item C:\LiteRT-LM\bazel-bin\c\libLiteRtLm.dylib artifacts\LiteRtLm.dll
          Copy-Item StreamProxy.dll artifacts\
          Get-ChildItem C:\LiteRT-LM\prebuilt\windows_x86_64\*.dll |
            Copy-Item -Destination artifacts\ -ErrorAction SilentlyContinue
          Get-ChildItem artifacts\

      - uses: actions/upload-artifact@v4
        with:
          name: litertlm-windows_x86_64
          path: artifacts/

  publish-release:
    name: Publish to GitHub Release
    needs: [build-linux-x86_64, build-linux-arm64, build-windows-x86_64]
    if: inputs.publish_release
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      LITERTLM_VERSION: ${{ inputs.litertlm_version || 'v0.10.2' }}
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/

      - name: Package archives
        run: |
          mkdir -p release
          for dir_name in linux_x86_64 linux_arm64 windows_x86_64; do
            dir="artifacts/litertlm-${dir_name}"
            archive="litertlm-${dir_name}.tar.gz"
            if [ -d "$dir" ]; then
              tar -czf "release/${archive}" -C "$dir" .
              echo "Packaged: ${archive}"
            fi
          done
          cd release && sha256sum *.tar.gz > checksums_litertlm.txt
          cat checksums_litertlm.txt

      - name: Delete old CI assets from release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          for asset in litertlm-linux_x86_64.tar.gz litertlm-linux_arm64.tar.gz litertlm-windows_x86_64.tar.gz checksums_litertlm.txt; do
            gh release delete-asset "native-$LITERTLM_VERSION" "$asset" -y 2>/dev/null || true
          done

      - name: Create/update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: native-${{ env.LITERTLM_VERSION }}
          name: Native Libraries ${{ env.LITERTLM_VERSION }}
          body: |
            LiteRT-LM native libraries built from source ${{ env.LITERTLM_VERSION }}.

            Platforms included (CI-built):
            - Linux x86_64
            - Linux arm64
            - Windows x86_64

            macOS/iOS/Android archives are uploaded separately after local builds.
          files: release/*
          fail_on_unmatched_files: false
