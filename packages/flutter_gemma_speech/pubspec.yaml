name: flutter_gemma_speech
description: "On-device speech (STT now; TTS/voice later) for flutter_gemma via the LiteRT C API + dart:ffi. Opt-in SttBackendProvider."
version: 0.1.0
homepage: https://fluttergemma.dev
repository: https://github.com/DenisovAV/flutter_gemma/tree/main/packages/flutter_gemma_speech
topics: [speech, stt, gemma, litert, on-device]

# 5 native platforms via dart:ffi (LiteRT C API, shared with flutter_gemma_litertlm).
# Web is declared but not yet implemented — the web arm of the conditional
# export throws UnsupportedError until the STT web pipeline lands (follow-on).
platforms:
  android:
  ios:
  web:
  macos:
  windows:
  linux:

resolution: workspace

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_gemma: ^1.4.0
  flutter_gemma_litertlm: ^1.3.0
  ffi: ^2.1.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

# No flutter: plugin/asset block, no hook/build.dart of its own. The LiteRt
# interpreter FFI (LiteRtBindings) and the shared libLiteRtLm native bundle
# come transitively from flutter_gemma_litertlm, which owns the sole hook.
