name: flutter_gemma_embeddings
description: "On-device text embeddings (Gecko / EmbeddingGemma .tflite via LiteRT + dart:ffi) for flutter_gemma. Opt-in EmbeddingBackendProvider for on-device RAG."
version: 1.0.1
homepage: https://fluttergemma.dev
repository: https://github.com/DenisovAV/flutter_gemma/tree/main/packages/flutter_gemma_embeddings
topics: [embeddings, gemma, litert, rag, on-device]

# All six platforms: 5 native via dart:ffi (LiteRT C API) + web via LiteRT.js.
# Declared explicitly so the supported set is the package's own contract, not
# inferred from the transitive import graph.
platforms:
  android:
  ios:
  web:
  macos:
  windows:
  linux:

resolution: workspace

environment:
  sdk: '>=3.12.0 <4.0.0'
  flutter: '>=3.44.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_gemma: ^1.0.0
  ffi: ^2.1.0
  hooks: ^1.0.0
  code_assets: ^1.0.0
  crypto: ^3.0.6
  dart_sentencepiece_tokenizer: ^1.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

# No flutter: plugin/asset block. Native lib delivered via hook/build.dart.
# No dependency on flutter_gemma_litertlm: this package is usable on its own.
# It shares litertlm's LiteRT-LM bundle via the coordination protocol's marker
# (single-registrant: the first hook to write the marker owns CodeAsset
# registration). Used alongside litertlm, litertlm is the registrant and this
# hook only dedups the cache; used alone, this hook is the first-writer and
# registers libLiteRtLm itself.
