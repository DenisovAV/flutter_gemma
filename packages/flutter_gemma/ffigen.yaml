name: 'LiteRtLmBindings'
description: 'FFI bindings for LiteRT-LM C API'
output: 'lib/core/ffi/litert_lm_bindings.dart'
headers:
  entry-points:
    - 'native/litert_lm/include/engine.h'
  include-directives:
    - 'native/litert_lm/include/engine.h'
compiler-opts:
  - '-I'
  - 'native/litert_lm/include'
enums:
  include:
    - 'Type'
    - 'InputDataType'
structs:
  include:
    - 'LiteRtLm.*'
    - 'InputData'
unions:
  include:
    - 'LiteRtLm.*'
unnamed-enums:
  include:
    - 'LiteRtLm.*'
globals:
  include:
    - 'litert_lm.*'
macros:
  include:
    - 'LITERT_LM.*'
typedefs:
  include:
    - 'LiteRtLm.*'
    - 'InputData.*'
    - 'Type'
functions:
  include:
    - 'litert_lm.*'
silence-enum-warning: true
preamble: |
  // AUTO-GENERATED by ffigen - DO NOT EDIT
  // Source: native/litert_lm/include/engine.h
