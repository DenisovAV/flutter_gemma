name: flutter_gemma_workspace
publish_to: none

environment:
  sdk: ">=3.6.0 <4.0.0"

# Native Dart pub workspace (Dart 3.6+). Each member opts in with
# `resolution: workspace` in its own pubspec.yaml.
workspace:
  - packages/flutter_gemma

dev_dependencies:
  melos: ^7.0.0

# Melos 7.x reads its configuration from this `melos:` section of the root
# pubspec.yaml (there is no standalone melos.yaml in melos 7). The package list
# comes from the top-level `workspace:` key above.
melos:
  command:
    bootstrap:
      runPubGetInParallel: true

  scripts:
    analyze:
      run: melos exec -- "flutter analyze"
      description: Analyze every package.
    test:
      run: melos exec --dir-exists=test -- "flutter test"
      description: Unit-test every package that has a test/ dir.
