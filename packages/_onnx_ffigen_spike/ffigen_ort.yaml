name: OnnxRuntimeBindings
description: 'FFI bindings for plain ONNX Runtime C API (onnxruntime_c_api.h v1.27.0)'
output: 'lib/src/onnxruntime_bindings.g.dart'

headers:
  entry-points:
    - 'native/headers/onnxruntime_c_api.h'
  # onnxruntime_c_api.h #includes onnxruntime_ep_c_api.h at the end (line 8648).
  # Both files must be in native/headers/ — ffigen fails with a fatal parse error
  # if the companion is missing. Only bind types from the main header.
  include-directives:
    - 'native/headers/onnxruntime_c_api.h'

compiler-opts:
  - '-I'
  - 'native/headers'
  # macOS arm64 target to resolve platform-specific branches in the header
  - '-D__APPLE__'
  - '-D__arm64__'
  # Mark NO_EXCEPTION as empty (it's already defined for non-C++ in the header,
  # but ffigen parses in C mode so the throw() branch may be taken)
  - '-DNO_EXCEPTION='
  # ORT_EXPORT is __attribute__((visibility("default"))) on non-Windows
  - '-DORT_EXPORT=__attribute__((visibility("default")))'
  # ORT_API_CALL is empty on non-Windows
  - '-DORT_API_CALL='

# The ORT C API exposes only ONE real exported C function: OrtGetApiBase.
# All other APIs are accessed via function pointers in the OrtApi struct.
# Bind the entry-point function and the structs it returns.
functions:
  include:
    - 'OrtGetApiBase'

structs:
  include:
    - 'OrtApiBase'
    - 'OrtApi'
    - 'OrtEnv'
    - 'OrtSession'
    - 'OrtSessionOptions'
    - 'OrtRunOptions'
    - 'OrtValue'
    - 'OrtTypeInfo'
    - 'OrtTensorTypeAndShapeInfo'
    - 'OrtAllocator'
    - 'OrtMemoryInfo'
    - 'OrtIoBinding'
    - 'OrtStatus'
    - 'OrtCustomOpDomain'
    - 'OrtModelMetadata'

typedefs:
  include:
    - 'Ort.*'
    - 'OrtLoggingFunction'
    - 'OrtCustomJoinThreadFn'
    - 'OrtCustomCreateThreadFn'

enums:
  include:
    - 'OrtLoggingLevel'
    - 'OrtErrorCode'
    - 'ONNXType'
    - 'ONNXTensorElementDataType'
    - 'OrtSparseFormat'
    - 'OrtSparseIndicesFormat'
    - 'OrtAllocatorType'
    - 'OrtMemType'
    - 'OrtMemoryInfoDeviceType'
    - 'GraphOptimizationLevel'
    - 'ExecutionMode'
    - 'OrtLanguageProjection'

macros:
  include:
    - 'ORT_API_VERSION'

globals:
  exclude:
    - '.*'

silence-enum-warning: true

preamble: |
  // AUTO-GENERATED by ffigen — DO NOT EDIT.
  // Source: native/headers/onnxruntime_c_api.h
  // ONNX Runtime version: 1.27.0  (ORT_API_VERSION = 27)
  // Header commit: 8f0278c77bf44b0cc83c098c6c722b92a36ac4b5 (microsoft/onnxruntime tag v1.27.0)
  //
  // Design note: ORT's C API is a struct-of-function-pointers.
  // OrtGetApiBase() is the sole exported symbol; it returns OrtApiBase*
  // from which you call ->GetApi(ORT_API_VERSION) to get OrtApi*.
  // Member paths exercised in the smoke: CreateEnv, CreateSession, Run,
  // GetTensorMutableData, ReleaseSession, ReleaseEnv, ReleaseStatus.
  // ignore_for_file: unused_import, non_constant_identifier_names
