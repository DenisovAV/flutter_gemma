name: fluttergemma_website
description: Marketing and documentation website for the flutter_gemma plugin.
version: 0.0.1
publish_to: none
# Deliberately NOT a member of the root `workspace:` list — keeps jaspr +
# embedded-flutter deps out of the 6 published packages' pub graph / pana.

environment:
  sdk: ^3.10.0

dependencies:
  jaspr: ^0.23.1
  jaspr_content: ^0.5.2
  jaspr_router: ^0.8.2

dev_dependencies:
  build_runner: ^2.10.0
  build_web_compilers: ^4.8.0
  jaspr_builder: ^0.23.1
  lints: ^5.0.0

jaspr:
  mode: static
