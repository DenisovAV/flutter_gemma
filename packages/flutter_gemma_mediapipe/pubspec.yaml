name: flutter_gemma_mediapipe
description: "MediaPipe (.task) on-device inference engine for flutter_gemma (Android/iOS/Web). Opt-in package; provides an InferenceEngineProvider. Bundles Google's MediaPipe Pod/Gradle deps."
version: 0.1.0
homepage: https://github.com/DenisovAV/flutter_gemma
repository: https://github.com/DenisovAV/flutter_gemma
publish_to: none

resolution: workspace

environment:
  sdk: '>=3.6.0 <4.0.0'
  flutter: '>=3.24.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_gemma:
    path: ../flutter_gemma
  mutex: ^3.1.0
  plugin_platform_interface: ^2.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  pigeon: ^26.0.0

flutter:
  plugin:
    platforms:
      android:
        package: dev.flutterberlin.flutter_gemma_mediapipe
        pluginClass: FlutterGemmaMediaPipePlugin
      ios:
        pluginClass: FlutterGemmaMediaPipePlugin
